apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Test Pipeline (Feature Branches)

# This workflow runs on PRs targeting master/alpha/beta
# Triggers on PR open, new commits pushed to PR, and PR reopen
# For direct pushes to master/alpha/beta, the combined Test and Publish Pipeline runs instead

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - master
      - alpha
      - beta

jobs:
  test:
    steps:
      - name: Checkout Code
        uses: cloudbees-io/checkout@v1

      - name: Run Tests
        uses: docker://node:18
        env:
          SFDX_AUTH_URL: ${{ vars.SFDX_AUTH_URL }}
        run: |
          echo "=== Installing jq and SF CLI ==="
          apt-get update && apt-get install -y jq
          npm install -g @salesforce/cli
          sf --version
          
          echo "=== Authenticating to Salesforce ==="
          if [ -z "$SFDX_AUTH_URL" ]; then
            echo "ERROR: SFDX_AUTH_URL is not set. Configure it in CloudBees vars."
            exit 1
          fi
          AUTH_FILE=$(mktemp)
          echo "$SFDX_AUTH_URL" > "$AUTH_FILE"
          AUTH_RESULT=$(sf org login sfdx-url --sfdx-url-file "$AUTH_FILE" --json 2>&1)
          rm -f "$AUTH_FILE"
          SF_USERNAME=$(echo "$AUTH_RESULT" | jq -r '.result.username // empty')
          if [ -z "$SF_USERNAME" ]; then
            echo "ERROR: Salesforce authentication failed. Auth result:"
            echo "$AUTH_RESULT" | jq . 2>/dev/null || echo "$AUTH_RESULT"
            exit 1
          fi
          echo "Authenticated as: $SF_USERNAME"
          
          echo "=== Installing dependencies ==="
          npm install
          
          echo "=== Running Unit Tests ==="
          npm run-script unitTest
          
          echo "=== Linking package ==="
          npm link
          
          echo "=== Running Vlocity Test Job (Verbose) ==="
          vlocity -sfdx.username "$SF_USERNAME" runTestJob --verbose
          
          echo "=== Running Vlocity Test Job (JSON) ==="
          vlocity -sfdx.username "$SF_USERNAME" runTestJob --json | jq .
          
          echo "=========================================="
          echo "TEST PIPELINE - PASSED"
          echo "=========================================="
