apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Test Pipeline (Feature Branches)

# This workflow runs on PRs targeting master/alpha/beta
# Triggers on PR open, new commits pushed to PR, and PR reopen
# For direct pushes to master/alpha/beta, the combined Test and Publish Pipeline runs instead

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - master
      - alpha
      - beta

jobs:
  test:
    steps:
      - name: Checkout Code
        uses: cloudbees-io/checkout@v1

      - name: Run Tests
        uses: docker://node:18
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
        run: |
          echo "=== Installing jq ==="
          apt-get update && apt-get install -y jq
          
          echo "=== Authenticating to Salesforce ==="
          if [ -z "$SF_LOGIN_URL" ] || [ -z "$SF_USERNAME" ] || [ -z "$SF_PASSWORD" ]; then
            echo "ERROR: Missing Salesforce credentials."
            echo "Configure SF_LOGIN_URL, SF_USERNAME, SF_PASSWORD as secrets in CloudBees."
            exit 1
          fi
          
          echo "=== Installing dependencies ==="
          npm install
          
          echo "=== Verifying Salesforce login via jsforce ==="
          node -e "
          const jsforce = require('jsforce');
          const conn = new jsforce.Connection({ loginUrl: process.env.SF_LOGIN_URL });
          conn.login(process.env.SF_USERNAME, process.env.SF_PASSWORD).then(() => {
            return conn.identity();
          }).then(identity => {
            console.log('Authenticated as: ' + identity.username);
            console.log('Org ID: ' + identity.organization_id);
          }).catch(err => {
            console.error('ERROR: Salesforce login failed:', err.message);
            process.exit(1);
          });
          "
          
          echo "=== Running Unit Tests ==="
          npm run-script unitTest
          
          echo "=== Linking package ==="
          npm link
          
          echo "=== Running Vlocity Test Job (Verbose) ==="
          vlocity -sf.username "$SF_USERNAME" -sf.password "$SF_PASSWORD" -sf.loginUrl "$SF_LOGIN_URL" runTestJob --verbose
          
          echo "=== Running Vlocity Test Job (JSON) ==="
          vlocity -sf.username "$SF_USERNAME" -sf.password "$SF_PASSWORD" -sf.loginUrl "$SF_LOGIN_URL" runTestJob --json | jq .
          
          echo "=========================================="
          echo "TEST PIPELINE - PASSED"
          echo "=========================================="
