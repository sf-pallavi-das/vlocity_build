apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Test Pipeline (Feature Branches)

# This workflow runs on PRs targeting master/alpha/beta
# Triggers on PR open, new commits pushed to PR, and PR reopen
# For direct pushes to master/alpha/beta, the combined Test and Publish Pipeline runs instead

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - master
      - alpha
      - beta

jobs:
  test:
    steps:
      - name: Checkout Code
        uses: cloudbees-io/checkout@v1

      - name: Run Tests
        uses: docker://node:18
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
        run: |
          echo "=== Installing jq and SF CLI ==="
          apt-get update && apt-get install -y jq curl
          npm install -g @salesforce/cli
          sf --version
          
          echo "=== Authenticating to Salesforce ==="
          if [ -z "$SF_LOGIN_URL" ] || [ -z "$SF_USERNAME" ] || [ -z "$SF_PASSWORD" ]; then
            echo "ERROR: Missing Salesforce credentials."
            echo "Configure SF_LOGIN_URL, SF_USERNAME, SF_PASSWORD as secrets in CloudBees."
            exit 1
          fi
          
          SOAP_RESPONSE=$(curl -s --max-time 30 "${SF_LOGIN_URL}/services/Soap/u/59.0" \
            -H "Content-Type: text/xml" \
            -H "SOAPAction: login" \
            -d "<?xml version='1.0' encoding='utf-8'?><soap:Envelope xmlns:soap='http://schemas.xmlsoap.org/soap/envelope/' xmlns:tns='urn:partner.soap.sforce.com'><soap:Body><tns:login><tns:username>${SF_USERNAME}</tns:username><tns:password>${SF_PASSWORD}</tns:password></tns:login></soap:Body></soap:Envelope>")
          
          SESSION_ID=$(echo "$SOAP_RESPONSE" | grep -oP '<sessionId>\K[^<]+')
          SERVER_URL=$(echo "$SOAP_RESPONSE" | grep -oP '<serverUrl>\K[^<]+' | sed 's|/services/Soap/u/.*||')
          
          if [ -z "$SESSION_ID" ]; then
            echo "ERROR: SOAP login failed. Response:"
            echo "$SOAP_RESPONSE"
            exit 1
          fi
          
          echo "$SESSION_ID" | sf org login access-token --instance-url "$SERVER_URL" --no-prompt --json 2>&1
          echo "Authenticated as: $SF_USERNAME"
          
          echo "=== Installing dependencies ==="
          npm install
          
          echo "=== Running Unit Tests ==="
          npm run-script unitTest
          
          echo "=== Linking package ==="
          npm link
          
          echo "=== Running Vlocity Test Job (Verbose) ==="
          vlocity -sfdx.username "$SF_USERNAME" runTestJob --verbose
          
          echo "=== Running Vlocity Test Job (JSON) ==="
          vlocity -sfdx.username "$SF_USERNAME" runTestJob --json | jq .
          
          echo "=========================================="
          echo "TEST PIPELINE - PASSED"
          echo "=========================================="
